<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Попап</title>
    <meta name="description" content="Попап формы заявки" />
    <link rel="stylesheet" href="/src/styles/popup.css" />
  </head>
  <body class="page page--popup">
    <main class="popup-showcase">
      <section class="request-modal request-modal--open" aria-label="Форма заявки">
        <a class="request-modal__close" href="/src/pages/index.html" aria-label="Закрыть">×</a>
        <h1>ОСТАВИТЬ ЗАЯВКУ</h1>

        <form class="request-form" action="#" method="post">
          <input type="text" name="name" placeholder="имя" aria-label="Имя" />
          <input type="email" name="email" placeholder="почта" aria-label="Почта" />

          <div class="request-form__row">
            <input type="tel" name="phone" placeholder="телефон" aria-label="Телефон" />
            <input type="text" name="time" placeholder="время" aria-label="Время" />
          </div>

          <div class="request-form__select" aria-label="Удобное средство связи">
            <button class="request-form__select-trigger" type="button" aria-expanded="false" data-request-select-trigger>
              <span>удобное средство связи</span>
              <span class="request-form__select-icon" aria-hidden="true"></span>
            </button>

            <div class="request-form__select-panel" hidden>
              <label class="request-form__radio">
                <input type="radio" name="contact" value="telegram" />
                <span>Telegram</span>
              </label>
              <label class="request-form__radio">
                <input type="radio" name="contact" value="whatsapp" />
                <span>What’sApp</span>
              </label>
              <label class="request-form__radio">
                <input type="radio" name="contact" value="mobile" />
                <span>Мобильная связь</span>
              </label>
            </div>
          </div>

          <label class="request-form__consent">
            <input type="checkbox" name="privacy" />
            <span>Нажимая кнопку, вы даете согласие на обработку персональных данных, в соответствии с политикой конфиденциальности</span>
          </label>

          <label class="request-form__consent">
            <input type="checkbox" name="ads" />
            <span>Согласие на получение рекламных предложений по телефону и email</span>
          </label>

          <button type="submit" class="request-form__submit">отправить</button>
        </form>
      </section>

      <section class="request-modal request-modal--message" aria-label="Форма заявки с сообщением">
        <a class="request-modal__close" href="/src/pages/index.html" aria-label="Закрыть">×</a>
        <h2>ОСТАВИТЬ ЗАЯВКУ</h2>

        <form class="request-form" action="#" method="post">
          <input type="text" name="name" placeholder="имя" aria-label="Имя" />
          <input type="email" name="email" placeholder="почта" aria-label="Почта" />

          <div class="request-form__row">
            <input type="tel" name="phone" placeholder="телефон" aria-label="Телефон" />
            <input type="text" name="time" placeholder="время" aria-label="Время" />
          </div>

          <div class="request-form__select" aria-label="Удобное средство связи">
            <button class="request-form__select-trigger" type="button" aria-expanded="false" data-request-select-trigger>
              <span>удобное средство связи</span>
              <span class="request-form__select-icon" aria-hidden="true"></span>
            </button>
            <div class="request-form__select-panel" hidden></div>
          </div>

          <textarea name="message" rows="4" placeholder="сообщение" aria-label="Сообщение"></textarea>

          <label class="request-form__consent">
            <input type="checkbox" name="privacy" />
            <span>Нажимая кнопку, вы даете согласие на обработку персональных данных, в соответствии с политикой конфиденциальности</span>
          </label>

          <label class="request-form__consent">
            <input type="checkbox" name="ads" />
            <span>Согласие на получение рекламных предложений по телефону и email</span>
          </label>

          <button type="submit" class="request-form__submit">отправить</button>
        </form>
      </section>
    </main>
    <script type="module" src="/src/scripts/request-form-mask.js"></script>
  </body>
</html>
