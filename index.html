<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mircli Pages</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-width: 320px;
        font-family: Roboto, Arial, sans-serif;
        background: #f4f4f6;
        color: #020a11;
      }

      main {
        max-width: 1120px;
        margin: 0 auto;
        padding: 40px 20px;
      }

      h1 {
        margin: 0 0 16px;
        font-size: 32px;
        font-weight: 500;
      }

      p {
        margin: 0 0 24px;
        color: #7f8a9c;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 12px;
      }

      a {
        display: block;
        padding: 16px 18px;
        border-radius: 12px;
        background: #fff;
        color: #293c5a;
        text-decoration: none;
        border: 1px solid #eaebee;
        transition: border-color 0.2s ease, transform 0.2s ease;
      }

      

      a.is-highlighted {
        border-color: #f28a2d;
        color: #b85f00;
        background: #fff4e8;
      }

      a.is-highlighted:hover {
        border-color: #d97918;
      }
    </style>
  </head>
  <body class="page page--index">
    <div class="page-shell">
      <main>
        <h1>Mircli Pages</h1>
        <p>Навигационная страница со ссылками на все HTML-страницы проекта.</p>
        <nav class="grid" aria-label="Страницы проекта">
          <a class="is-highlighted" href="/src/pages/index.html">Главная</a>
          <a class="is-highlighted" href="/src/pages/catalog.html">Каталог</a>
          <a href="/src/pages/about.html">О компании</a>
          <a href="/src/pages/contacts.html">Контакты</a>
          <a href="/src/pages/reviews.html">Отзывы</a>
          <a href="/src/pages/blog.html">Блог</a>
          <a href="/src/pages/article.html">Статья</a>
          <a class="is-highlighted" href="/src/pages/product.html">Товар</a>
          <a href="/src/pages/service.html">Установка и обслуживание</a>
          <a href="/src/pages/privacy.html">Политика конфиденциальности</a>
          <a href="/src/pages/404.html">404</a>
        </nav>
      </main>
    </div>
  </body>
</html>
