<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mircli Pages</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-width: 320px;
        font-family: Roboto, Arial, sans-serif;
        background: #f4f4f6;
        color: #020a11;
      }

      main {
        max-width: 1120px;
        margin: 0 auto;
        padding: 40px 20px;
      }

      h1 {
        margin: 0 0 16px;
        font-size: 32px;
        font-weight: 500;
      }

      p {
        margin: 0 0 24px;
        color: #7f8a9c;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 12px;
      }

      a {
        position: relative;
        display: block;
        padding: 18px 18px 16px;
        border-radius: 12px;
        background: #fff;
        color: #293c5a;
        text-decoration: none;
        border: 1px solid #eaebee;
        transition: border-color 0.2s ease, transform 0.2s ease;
      }

      a:hover {
        border-color: #cfd6e2;
        transform: translateY(-2px);
        box-shadow: 0 10px 24px rgba(16, 24, 40, 0.08);
      }

      a:focus-visible {
        outline: 2px solid #293c5a;
        outline-offset: 2px;
      }

      .desktop-badge {
        position: absolute;
        top: 10px;
        right: 10px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 18px;
        padding: 0 6px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.6);
        color: #b85f00;
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        pointer-events: none;
      }
    </style>
  </head>
  <body class="page page--index">
    <div class="page-shell">
      <main>
        <h1>Охлаждайкин Pages</h1>
        <p>Навигационная страница со ссылками на все HTML-страницы проекта.</p>
        <nav class="grid" aria-label="Страницы проекта">
          <a href="/src/pages/index.html">Главная</a>
          <a href="/src/pages/catalog.html">Каталог</a>
          <a href="/src/pages/about.html">О компании</a>
          <a href="/src/pages/contacts.html">Контакты</a>
          <a href="/src/pages/reviews.html">Отзывы</a>
          <a href="/src/pages/blog.html">Блог</a>
          <a href="/src/pages/article.html">Статья</a>
          <a href="/src/pages/product.html">Товар</a>
          <a href="/src/pages/service.html">Установка и обслуживание</a>
          <a href="/src/pages/privacy.html">Политика конфиденциальности</a>
          <a href="/src/pages/404.html">404</a>
        </nav>
      </main>
    </div>
  </body>
</html>
